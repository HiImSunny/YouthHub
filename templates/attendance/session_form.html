{% extends 'base.html' %}
{% block title %}TẠO PHIÊN ĐIỂM DANH — YOUTHHUB{% endblock %}

{% block content %}
<div class="max-w-xl">
    <h1 class="text-4xl font-black uppercase tracking-tighter mb-6">➕ TẠO PHIÊN ĐIỂM DANH</h1>

    <div class="bg-white border-3 border-black p-6 shadow-brutal-lg">
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-black uppercase mb-2">TÊN PHIÊN <span
                        class="text-accent-red">*</span></label>
                <input type="text" name="name" required
                    class="w-full border-3 border-black bg-white p-3 font-bold uppercase placeholder:text-slate-400 focus:ring-0 focus:border-black text-sm"
                    placeholder="VD: ĐIỂM DANH KHAI MẠC">
            </div>

            <div>
                <label class="block text-sm font-black uppercase mb-2">HOẠT ĐỘNG <span
                        class="text-accent-red">*</span></label>
                <select name="activity" required
                    class="w-full border-3 border-black bg-white p-3 font-bold uppercase text-sm focus:ring-0">
                    <option value="">-- CHỌN HOẠT ĐỘNG --</option>
                    {% for act in activities %}
                    <option value="{{ act.pk }}">{{ act.title }} ({{ act.start_time|date:"d/m/Y" }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-black uppercase mb-2">GIỜ BẮT ĐẦU <span
                            class="text-accent-red">*</span></label>
                    <input type="datetime-local" name="start_time" required
                        class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm">
                </div>
                <div>
                    <label class="block text-sm font-black uppercase mb-2">GIỜ KẾT THÚC <span
                            class="text-accent-red">*</span></label>
                    <input type="datetime-local" name="end_time" required
                        class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm">
                </div>
            </div>

            <div class="border-3 border-black bg-bg-light p-4 flex items-center gap-3">
                <input type="checkbox" name="requires_photo" id="requires_photo"
                    class="w-5 h-5 border-3 border-black focus:ring-0 text-primary">
                <label for="requires_photo">
                    <span class="text-sm font-black uppercase">YÊU CẦU ẢNH SELFIE MINH CHỨNG</span>
                    <span class="block text-xs font-bold text-slate-500 mt-0.5 uppercase">CÁN BỘ DUYỆT TỪNG ẢNH THỦ
                        CÔNG</span>
                </label>
            </div>

            <div class="flex gap-4 pt-2">
                <button type="submit"
                    class="flex-1 bg-primary text-white border-3 border-black p-4 font-black uppercase shadow-brutal brutal-btn transition-all">
                    TẠO PHIÊN & LẤY MÃ QR
                </button>
                <a href="{% url 'attendance:sessions' %}"
                    class="bg-white border-3 border-black p-4 font-black uppercase shadow-brutal-sm brutal-btn transition-all text-center px-8">HỦY</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
