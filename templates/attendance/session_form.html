{% extends 'base.html' %}
{% block title %}TẠO PHIÊN ĐIỂM DANH — YOUTHHUB{% endblock %}

{% block content %}
<div class="max-w-xl">
    <h1 class="text-4xl font-black uppercase tracking-tighter mb-6">➕ TẠO PHIÊN ĐIỂM DANH</h1>

    <div class="bg-white border-3 border-black p-6 shadow-brutal-lg">
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-black uppercase mb-2">TÊN PHIÊN <span
                        class="text-accent-red">*</span></label>
                <input type="text" name="name" required
                    class="w-full border-3 border-black bg-white p-3 font-bold uppercase placeholder:text-slate-400 focus:ring-0 focus:border-black text-sm"
                    placeholder="VD: ĐIỂM DANH KHAI MẠC">
            </div>

            <div>
                <label class="block text-sm font-black uppercase mb-2">HOẠT ĐỘNG <span
                        class="text-accent-red">*</span></label>
                <select name="activity" id="id_activity" required
                    class="w-full border-3 border-black bg-white p-3 font-bold uppercase text-sm focus:ring-0">
                    <option value="" data-start="" data-end="">-- CHỌN HOẠT ĐỘNG --</option>
                    {% for act in activities %}
                    <option value="{{ act.pk }}" data-start="{{ act.start_time|date:'Y-m-d\TH:i' }}" data-end="{{ act.end_time|date:'Y-m-d\TH:i' }}">{{ act.title }} ({{ act.start_time|date:"d/m/Y" }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-black uppercase mb-2">GIỜ BẮT ĐẦU <span
                            class="text-accent-red">*</span></label>
                    <input type="datetime-local" name="start_time" id="id_start_time" required
                        class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm">
                </div>
                <div>
                    <label class="block text-sm font-black uppercase mb-2">GIỜ KẾT THÚC <span
                            class="text-accent-red">*</span></label>
                    <input type="datetime-local" name="end_time" id="id_end_time" required
                        class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm">
                    <p id="end_time_warning" class="hidden text-xs text-accent-yellow font-bold mt-2 bg-black p-2 uppercase">Lưu ý: Thời gian kết thúc này diễn ra sau khi sự kiện đã kết thúc.</p>
                </div>
            </div>

            <div class="border-3 border-black bg-bg-light p-4 flex items-center gap-3">
                <input type="checkbox" name="requires_photo" id="requires_photo"
                    class="w-5 h-5 border-3 border-black focus:ring-0 text-primary">
                <label for="requires_photo">
                    <span class="text-sm font-black uppercase">YÊU CẦU ẢNH SELFIE MINH CHỨNG</span>
                    <span class="block text-xs font-bold text-slate-500 mt-0.5 uppercase">CÁN BỘ DUYỆT TỪNG ẢNH THỦ
                        CÔNG</span>
                </label>
            </div>

            <div class="flex gap-4 pt-2">
                <button type="submit"
                    class="flex-1 bg-primary text-white border-3 border-black p-4 font-black uppercase shadow-brutal brutal-btn transition-all">
                    TẠO PHIÊN & LẤY MÃ QR
                </button>
                <a href="{% url 'attendance:sessions' %}"
                    class="bg-white border-3 border-black p-4 font-black uppercase shadow-brutal-sm brutal-btn transition-all text-center px-8">HỦY</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const activitySelect = document.getElementById('id_activity');
        const startTimeInput = document.getElementById('id_start_time');
        const endTimeInput = document.getElementById('id_end_time');
        const warningText = document.getElementById('end_time_warning');

        function checkEndTime() {
            const selectedOption = activitySelect.options[activitySelect.selectedIndex];
            const actEnd = selectedOption.getAttribute('data-end');
            
            if (actEnd && endTimeInput.value) {
                if (endTimeInput.value > actEnd) {
                    warningText.classList.remove('hidden');
                } else {
                    warningText.classList.add('hidden');
                }
            } else {
                warningText.classList.add('hidden');
            }
        }

        activitySelect.addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const actStart = selectedOption.getAttribute('data-start');
            const actEnd = selectedOption.getAttribute('data-end');

            if (actStart) {
                // Ràng buộc min cho start_time là thời gian diễn ra hoạt động
                startTimeInput.min = actStart;
                
                // Autofill nếu chưa chọn thời gian trước đó
                if (!startTimeInput.value) {
                    startTimeInput.value = actStart;
                }
            } else {
                startTimeInput.removeAttribute('min');
            }

            if (actEnd && !endTimeInput.value) {
                endTimeInput.value = actEnd;
            }

            checkEndTime();
        });

        endTimeInput.addEventListener('change', checkEndTime);
    });
</script>
{% endblock %}
