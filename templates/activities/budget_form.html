{% extends 'base.html' %}
{% block title %}TẠO NGÂN SÁCH - {{ activity.title|upper }} — YOUTHHUB{% endblock %}

{% block content %}
<div class="max-w-xl">
    <h1 class="text-4xl font-black uppercase tracking-tighter mb-1">TẠO NGÂN SÁCH</h1>
    <p class="text-sm font-bold uppercase bg-primary text-white inline-block px-4 py-1 border-3 border-black shadow-brutal">
            {{ activity.title|upper }}
        </p>

    <div class="bg-white border-3 border-black p-6 shadow-brutal-lg">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-black uppercase mb-2">TỔNG DỰ TRÙ BAN ĐẦU (₫)</label>
                <input type="number" name="total_amount" min="0" value="0"
                    class="w-full border-3 border-black bg-white p-3 font-bold text-sm focus:ring-0 focus:border-black">
                <p class="text-xs text-slate-500 font-bold mt-1">* Sẽ tự tính lại khi bạn thêm khoản mục</p>
            </div>
            <div>
                <label class="block text-sm font-black uppercase mb-2">MÔ TẢ / GHI CHÚ</label>
                <textarea name="description" rows="3"
                    class="w-full border-3 border-black bg-white p-3 font-bold text-sm focus:ring-0"
                    placeholder="Ghi chú về ngân sách..."></textarea>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit"
                    class="flex-1 bg-primary text-white border-3 border-black p-4 font-black uppercase shadow-brutal brutal-btn flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">add_circle</span>
                    TẠO NGÂN SÁCH
                </button>
                <a href="{% url 'activities:detail' pk=activity.pk %}"
                    class="bg-white border-3 border-black p-4 font-black uppercase shadow-brutal-sm brutal-btn px-8">
                    HỦY
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
