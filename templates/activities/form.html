{% extends 'base.html' %}
{% block title %}{% if is_edit %}SỬA{% else %}TẠO{% endif %} HOẠT ĐỘNG — YOUTHHUB{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <h1 class="text-4xl font-black uppercase tracking-tighter mb-6">{% if is_edit %}✏️ SỬA HOẠT ĐỘNG{% else %}⚡ TẠO HOẠT
        ĐỘNG{% endif %}</h1>

    <div class="bg-white border-3 border-black p-6 shadow-brutal-lg">
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-black uppercase mb-2">TÊN HOẠT ĐỘNG <span
                        class="text-accent-red">*</span></label>
                <input type="text" name="title" required value="{{ activity.title|default:'' }}"
                    class="w-full border-3 border-black bg-white p-3 font-bold uppercase placeholder:text-slate-400 focus:ring-0 focus:border-black text-sm"
                    placeholder="NHẬP TÊN HOẠT ĐỘNG">
            </div>

            <div>
                <label class="block text-sm font-black uppercase mb-2">MÔ TẢ</label>
                <textarea name="description" rows="4"
                    class="w-full border-3 border-black bg-white p-3 font-bold placeholder:text-slate-400 focus:ring-0 focus:border-black text-sm"
                    placeholder="MÔ TẢ CHI TIẾT...">{{ activity.description|default:'' }}</textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-black uppercase mb-2">TỔ CHỨC <span
                            class="text-accent-red">*</span></label>
                    <select name="organization" required
                        class="w-full border-3 border-black bg-white p-3 font-bold uppercase text-sm focus:ring-0">
                        <option value="">-- CHỌN --</option>
                        {% for org in organizations %}
                        <option value="{{ org.pk }}" {% if activity.organization_id == org.pk %}selected{% endif %}>{{
                            org.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-black uppercase mb-2">HỌC KỲ</label>
                    <select name="semester"
                        class="w-full border-3 border-black bg-white p-3 font-bold uppercase text-sm focus:ring-0">
                        <option value="">-- CHỌN --</option>
                        {% for sem in semesters %}
                        <option value="{{ sem.pk }}" {% if activity.semester_id == sem.pk %}selected{% endif %}>{{
                            sem.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-black uppercase mb-2">BẮT ĐẦU <span
                            class="text-accent-red">*</span></label>
                    <input type="datetime-local" name="start_time" required
                        value="{{ activity.start_time|date:'Y-m-d\TH:i'|default:'' }}"
                        class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm">
                </div>
                <div>
                    <label class="block text-sm font-black uppercase mb-2">KẾT THÚC <span
                            class="text-accent-red">*</span></label>
                    <input type="datetime-local" name="end_time" required
                        value="{{ activity.end_time|date:'Y-m-d\TH:i'|default:'' }}"
                        class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-black uppercase mb-2">ĐỊA ĐIỂM</label>
                    <input type="text" name="location" value="{{ activity.location|default:'' }}"
                        class="w-full border-3 border-black bg-white p-3 font-bold uppercase placeholder:text-slate-400 focus:ring-0 focus:border-black text-sm"
                        placeholder="VD: HỘI TRƯỜNG A">
                </div>
                <div>
                    <label class="block text-sm font-black uppercase mb-2">SỐ NGƯỜI TỐI ĐA</label>
                    <input type="number" name="max_participants" value="{{ activity.max_participants|default:'' }}"
                        class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm"
                        placeholder="0 = KHÔNG GIỚI HẠN">
                </div>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit"
                    class="flex-1 bg-primary text-white border-3 border-black p-4 font-black uppercase shadow-brutal brutal-btn transition-all">
                    {% if is_edit %}CẬP NHẬT{% else %}TẠO HOẠT ĐỘNG{% endif %}
                </button>
                <a href="{% url 'activities:list' %}"
                    class="bg-white border-3 border-black p-4 font-black uppercase shadow-brutal-sm brutal-btn transition-all text-center px-8">HỦY</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
