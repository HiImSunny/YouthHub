{% extends 'base.html' %}
{% block title %}ĐỔI MẬT KHẨU — YOUTHHUB{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="mb-8 text-center">
        <h1 class="text-4xl font-black uppercase tracking-tighter mb-2">ĐỔI MẬT KHẨU</h1>
        <p class="text-sm font-bold uppercase bg-primary text-white inline-block px-4 py-1 border-3 border-black shadow-brutal">
            BẢO MẬT TÀI KHOẢN
        </p>
    </div>

    <div class="bg-white border-3 border-black p-6 shadow-brutal-lg">
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-black uppercase mb-2">MẬT KHẨU HIỆN TẠI</label>
                <div class="relative">
                    <input type="password" name="current_password" required
                        class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm pr-12"
                        placeholder="Nhập mật khẩu hiện tại">
                    <button type="button" class="absolute inset-y-0 right-0 px-3 flex items-center bg-transparent text-slate-500 hover:text-black cursor-pointer toggle-password transition-colors">
                        <span class="material-symbols-outlined pointer-events-none text-xl">visibility_off</span>
                    </button>
                </div>
            </div>
            <div class="border-t-3 border-black my-2"></div>
            <div>
                <label class="block text-sm font-black uppercase mb-2">MẬT KHẨU MỚI</label>
                <div class="relative">
                    <input type="password" name="new_password" required
                        class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm pr-12"
                        placeholder="Tối thiểu 6 ký tự">
                    <button type="button" class="absolute inset-y-0 right-0 px-3 flex items-center bg-transparent text-slate-500 hover:text-black cursor-pointer toggle-password transition-colors">
                        <span class="material-symbols-outlined pointer-events-none text-xl">visibility_off</span>
                    </button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-black uppercase mb-2">XÁC NHẬN MẬT KHẨU MỚI</label>
                <div class="relative">
                    <input type="password" name="confirm_password" required
                        class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm pr-12"
                        placeholder="Nhập lại mật khẩu mới">
                    <button type="button" class="absolute inset-y-0 right-0 px-3 flex items-center bg-transparent text-slate-500 hover:text-black cursor-pointer toggle-password transition-colors">
                        <span class="material-symbols-outlined pointer-events-none text-xl">visibility_off</span>
                    </button>
                </div>
            </div>
            <div class="flex gap-3">
                <button type="submit"
                    class="flex-1 bg-primary text-white border-3 border-black p-4 font-black uppercase shadow-brutal brutal-btn transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">lock_reset</span>
                    ĐỔI MẬT KHẨU
                </button>
                <a href="{% url 'users:profile' %}"
                    class="bg-white border-3 border-black p-4 font-black uppercase shadow-brutal brutal-btn transition-all flex items-center justify-center gap-2 text-sm">
                    <span class="material-symbols-outlined">arrow_back</span>
                    QUAY LẠI
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('span');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility';
                    icon.classList.add('text-black');
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility_off';
                    icon.classList.remove('text-black');
                }
            });
        });
    });
</script>
{% endblock %}
