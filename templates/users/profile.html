{% extends 'base.html' %}
{% block title %}Hồ sơ cá nhân - YouthHub{% endblock %}

{% block content %}
<div class="fade-in max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Hồ sơ cá nhân</h1>

    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Tên đăng nhập</label>
                    <input type="text" value="{{ user.username }}" disabled
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-xl bg-gray-50 text-sm text-gray-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                    <input type="email" value="{{ user.email }}" disabled
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-xl bg-gray-50 text-sm text-gray-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Họ và tên</label>
                <input type="text" name="full_name" value="{{ user.full_name }}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Số điện thoại</label>
                <input type="text" name="phone" value="{{ user.phone|default:'' }}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 text-sm"
                    placeholder="0912345678">
            </div>

            <div class="grid grid-cols-2 gap-4 text-sm">
                <div class="bg-gray-50 rounded-lg p-3">
                    <p class="text-gray-400">Vai trò</p>
                    <p class="font-medium text-gray-900">{{ user.get_role_display }}</p>
                </div>
                <div class="bg-gray-50 rounded-lg p-3">
                    <p class="text-gray-400">Trạng thái</p>
                    <p class="font-medium text-green-600">{{ user.get_status_display }}</p>
                </div>
            </div>

            <button type="submit"
                class="px-6 py-2.5 rounded-xl text-white font-semibold gradient-bg hover:opacity-90 transition shadow-lg shadow-primary-500/25 text-sm">
                Cập nhật
            </button>
        </form>
    </div>
</div>
{% endblock %}
