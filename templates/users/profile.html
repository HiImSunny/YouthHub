{% extends 'base.html' %}
{% block title %}PROFILE — YOUTHHUB{% endblock %}

{% block content %}
<div class="max-w-xl">
    <h1 class="text-4xl font-black uppercase tracking-tighter mb-6">👤 PROFILE</h1>

    <div class="bg-white border-3 border-black p-6 shadow-brutal-lg">
        <div class="flex items-center gap-4 mb-6 pb-6 border-b-3 border-black">
            <div class="w-16 h-16 bg-primary border-3 border-black flex items-center justify-center shadow-brutal">
                <span class="text-2xl font-black text-white">{{ user.full_name|first|upper }}</span>
            </div>
            <div>
                <h2 class="text-xl font-black uppercase">{{ user.full_name }}</h2>
                <p class="text-sm font-bold uppercase text-slate-500 tracking-widest">{{ user.role }} · {{ user.username
                    }}</p>
            </div>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-black uppercase mb-2">HỌ TÊN</label>
                <input type="text" name="full_name" value="{{ user.full_name }}"
                    class="w-full border-3 border-black bg-white p-3 font-bold uppercase focus:ring-0 focus:border-black text-sm">
            </div>
            <div>
                <label class="block text-sm font-black uppercase mb-2">EMAIL</label>
                <input type="email" name="email" value="{{ user.email }}"
                    class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm">
            </div>
            <div>
                <label class="block text-sm font-black uppercase mb-2">SĐT</label>
                <input type="text" name="phone" value="{{ user.phone|default:'' }}"
                    class="w-full border-3 border-black bg-white p-3 font-bold focus:ring-0 focus:border-black text-sm"
                    placeholder="NHẬP SĐT">
            </div>
            <button type="submit"
                class="w-full bg-primary text-white border-3 border-black p-4 font-black uppercase shadow-brutal brutal-btn transition-all">
                CẬP NHẬT THÔNG TIN
            </button>
        </form>

        <div class="mt-4 pt-4 border-t-3 border-black">
            <a href="{% url 'users:change_password' %}"
                class="w-full bg-zinc-900 text-white border-3 border-black p-3 font-black uppercase shadow-brutal brutal-btn transition-all flex items-center justify-center gap-2 text-sm">
                <span class="material-symbols-outlined text-lg">lock_reset</span>
                ĐỔI MẬT KHẨU
            </a>
        </div>
    </div>
</div>
{% endblock %}
